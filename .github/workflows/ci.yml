name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Backend: lint, typecheck, test with coverage
  # ─────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Ruff check
        run: ruff check backend/

      - name: Ruff format check
        run: ruff format --check backend/

      - name: Mypy
        run: mypy backend/apps/ --ignore-missing-imports
        continue-on-error: true  # gradual adoption

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fintrack
          POSTGRES_USER: fintrack
          POSTGRES_PASSWORD: fintrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fintrack"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_NAME: fintrack
      DB_USER: fintrack
      DB_PASSWORD: fintrack
      DB_HOST: localhost
      DB_PORT: 5432
      DJANGO_SECRET_KEY: ci-secret-key-not-for-production
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run migrations
        run: python manage.py migrate --no-input
        working-directory: backend

      - name: Run tests with coverage
        run: pytest --cov=apps --cov-report=term-missing
        working-directory: backend

  # ─────────────────────────────────────────────────────────────────
  # Frontend: lint, typecheck, test with coverage, build
  # ─────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: ESLint
        run: npx eslint src/
        working-directory: frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx}"
        working-directory: frontend
        continue-on-error: true  # gradual adoption

  frontend-tests:
    name: Frontend tests & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests with coverage
        run: npx vitest run --coverage
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          DJANGO_INTERNAL_URL: http://localhost:8000

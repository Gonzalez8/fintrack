services:
  # postgres and redis are pulled from the AWS ECR Public mirror (S3-backed)
  # instead of docker.io directly because Docker Hub's Cloudflare R2 storage
  # is intermittently unreachable from many self-hosting networks, leading to
  # `context deadline exceeded` on `docker compose pull`. The ECR Public
  # `docker/library/*` repositories are official mirrors of Docker Hub
  # `library/*` and serve identical images.
  db:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-fintrack}
      POSTGRES_USER: ${DB_USER:-fintrack}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fintrack}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ghcr.io/gonzalez8/fintrack-backend:latest
    restart: unless-stopped
    command: ["sh", "-c", "python manage.py migrate --noinput && python manage.py collectstatic --noinput && (python manage.py createsuperuser --noinput || true) && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"]
    ports:
      - "8001:8000"
    environment:
      - DB_NAME=${DB_NAME:-fintrack}
      - DB_USER=${DB_USER:-fintrack}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:?ALLOWED_HOSTS must be set}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-true}
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-admin}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@fintrack.local}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/health/\")'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ghcr.io/gonzalez8/fintrack-frontend:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:3000"
    environment:
      - DJANGO_INTERNAL_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

  celery_worker:
    image: ghcr.io/gonzalez8/fintrack-backend:latest
    restart: unless-stopped
    command: celery -A config worker -l warning -c 2
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DB_NAME=${DB_NAME:-fintrack}
      - DB_USER=${DB_USER:-fintrack}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  celery_beat:
    image: ghcr.io/gonzalez8/fintrack-backend:latest
    restart: unless-stopped
    command: celery -A config beat -l warning
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DB_NAME=${DB_NAME:-fintrack}
      - DB_USER=${DB_USER:-fintrack}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  pgdata:

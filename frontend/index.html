<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Fintrack — Tu terminal de inversión personal</title>
    <meta name="description" content="Portfolio, dividendos, fiscalidad y ahorro en un solo lugar. Self-hosted, privado y completamente tuyo. FIFO, LIFO y WAC. Precios en tiempo real vía Yahoo Finance." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Fintrack — Tu terminal de inversión personal" />
    <meta property="og:description" content="Portfolio, dividendos, fiscalidad y ahorro en un solo lugar. Self-hosted, privado y completamente tuyo." />
    <meta property="og:url" content="https://fintrack-quintela.vercel.app/" />
    <meta property="og:site_name" content="Fintrack" />
    <meta property="og:image" content="https://fintrack-quintela.vercel.app/og-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fintrack — Tu terminal de inversión personal" />
    <meta name="twitter:description" content="Portfolio, dividendos, fiscalidad y ahorro en un solo lugar. Self-hosted, privado y completamente tuyo." />
    <meta name="twitter:image" content="https://fintrack-quintela.vercel.app/og-preview.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Fintrack",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "description": "Personal investment tracking application. Portfolio, dividends, taxes, and savings in one place. Self-hosted and private.",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" },
      "featureList": "Real-time portfolio tracking, FIFO/LIFO/WAC cost basis, Tax reports, Multi-account management, Yahoo Finance integration"
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <!-- Prevent flash of wrong theme before React hydrates — dark by default -->
    <script>
      ;(function () {
        if (localStorage.getItem('theme') !== 'light') {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <h1>Fintrack — Tu terminal de inversión personal</h1>
      <p>Portfolio, dividendos, fiscalidad y ahorro en un solo lugar. Self-hosted, privado y completamente tuyo.</p>
      <p>Cartera en tiempo real · Informes fiscales · Multi-cuenta · Privacidad total · Precios automáticos</p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
